<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LH 현장조사</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1a56a0;--blue-dk:#0f3d78;--blue-lt:#e8f0fb;
  --green:#059669;--red:#dc2626;
  --bg:#f0f2f7;--sur:#fff;
  --bdr:rgba(0,0,0,.09);--text:#111827;--muted:#6b7280;
  --r:12px;--rs:7px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--text);font-size:14px}
body{display:flex;flex-direction:column}

/* ── 로그인 ── */
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--blue)}
.login-box{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo .ic{font-size:40px;display:block;margin-bottom:8px}
.login-logo h1{font-size:18px;font-weight:700;color:var(--blue)}
.login-logo p{font-size:11px;color:var(--muted);margin-top:3px}
.login-field{margin-bottom:12px}
.login-field label{display:block;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:5px}
.login-field input{width:100%;padding:11px 14px;font-size:14px;border:1.5px solid var(--bdr);border-radius:var(--rs);font-family:inherit;outline:none;-webkit-appearance:none}
.login-field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,160,.1)}
.login-btn{width:100%;padding:13px;font-size:14px;font-weight:700;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;font-family:inherit;margin-top:4px}
.login-btn:active{background:var(--blue-dk)}
.login-err{font-size:11px;color:var(--red);text-align:center;margin-top:8px;min-height:16px}

/* ── HEADER ── */
.hdr{background:var(--blue);padding:8px 14px;padding-top:calc(8px + var(--st));display:flex;align-items:center;gap:8px;flex-shrink:0;display:none}
.hdr h1{font-size:14px;font-weight:700;color:#fff}
.hdr p{font-size:9px;color:rgba(255,255,255,.6);margin-top:1px}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:#6ee7b7;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.cloud-lbl{font-size:9px;color:rgba(255,255,255,.75);font-weight:600}
.cnt-b{background:rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700}
.logout-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:12px;padding:4px 9px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit}
.logout-btn:active{background:rgba(255,255,255,.3)}

/* ── TABS ── */
.tabs{display:flex;background:var(--sur);border-bottom:1px solid var(--bdr);flex-shrink:0;display:none}
.tab{flex:1;padding:9px 4px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;user-select:none}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.panel{display:none;padding:12px 16px;padding-bottom:calc(24px + var(--sb));max-width:640px;margin:0 auto;width:100%}
.panel.on{display:block}
@media(min-width:480px){.panel{padding:14px 20px;}}

/* ── CARD ── */
.card{background:var(--sur);border-radius:var(--r);border:1px solid var(--bdr);overflow:hidden;margin-bottom:8px}

/* ── 사진 버튼 ── */
.photo-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px}
.photo-btn{padding:10px 6px;border-radius:var(--rs);border:1.5px dashed var(--bdr);background:#f8f9fc;cursor:pointer;text-align:center;font-family:inherit;user-select:none;display:block}
.photo-btn:active{background:var(--blue-lt);border-color:var(--blue)}
.photo-btn .ic{font-size:20px;display:block;margin-bottom:3px}
.photo-btn .lb{font-size:10px;color:var(--muted);font-weight:700}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px 8px 0}
.form-full{grid-template-columns:1fr}
.field label{display:block;font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:700}
.field input{width:100%;padding:7px 9px;font-size:13px;border:1px solid var(--bdr);border-radius:var(--rs);background:#fff;color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;transition:border-color .15s}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(26,86,160,.1)}

/* ── CHIPS ── */
.chip-sec{padding:6px 8px 0}
.chip-sec-hd{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.chip-sec-hd label{font-size:10px;color:var(--muted);font-weight:700}
.edit-btn{width:20px;height:20px;border-radius:50%;border:1px solid var(--bdr);background:#f3f4f6;cursor:pointer;font-size:11px;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chip-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.chip{padding:4px 9px;font-size:11px;font-weight:700;border:1px solid var(--bdr);border-radius:20px;cursor:pointer;background:#f3f4f6;color:var(--text);font-family:inherit;user-select:none}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip-input{width:100%;padding:5px 8px;font-size:12px;border:1px solid var(--bdr);border-radius:6px;font-family:inherit;outline:none;-webkit-appearance:none}
.chip-input:focus{border-color:var(--blue)}

/* ── 도형 옵션 ── */
.draw-opts{display:flex;align-items:center;gap:8px;padding:6px 8px;border-top:1px solid var(--bdr);flex-wrap:wrap}
.draw-opts label{font-size:10px;color:var(--muted);font-weight:700}
.draw-opts input[type=color]{width:26px;height:22px;border:1px solid var(--bdr);border-radius:4px;cursor:pointer;padding:1px}
.draw-opts select{padding:4px 6px;font-size:11px;border:1px solid var(--bdr);border-radius:5px;background:#fff;font-family:inherit}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:5px;padding:6px 8px;background:#f8f9fc;border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.tool-btn{padding:6px 9px;font-size:11px;font-weight:700;border:1px solid var(--bdr);border-radius:6px;cursor:pointer;background:#fff;color:var(--text);font-family:inherit;user-select:none}
.tool-btn:active{background:var(--blue-lt)}
.tool-btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.pt-cnt{font-size:10px;color:var(--muted);margin-left:auto;font-weight:700}

/* ── CANVAS ── */
.canvas-wrap{position:relative;width:100%;background:#0d1117;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:200px}
.canvas-ph{text-align:center;color:rgba(255,255,255,.3);padding:16px;pointer-events:none;width:100%}
.canvas-ph .ic{font-size:28px;margin-bottom:6px}
.canvas-ph p{font-size:11px}
#mainCanvas,#overlayCanvas{position:absolute;top:0;left:0;width:100%;height:100%;display:none;touch-action:none}
#overlayCanvas{cursor:crosshair}
#saveBtn{position:absolute;left:8px;bottom:8px;z-index:10;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.4);display:none}
#saveBtn:active{transform:scale(.96)}
#saveBtn:disabled{opacity:.6}
#infoOv{position:absolute;left:8px;bottom:44px;z-index:9;background:rgba(0,15,50,.82);border:1px solid rgba(100,160,255,.3);border-radius:7px;padding:6px 10px;display:none;pointer-events:none}
.ov-row{display:flex;gap:6px;margin-bottom:2px}
.ov-row:last-child{margin-bottom:0}
.ov-lbl{font-size:9px;color:rgba(160,200,255,.7);min-width:44px}
.ov-val{font-size:9px;color:#fff;font-weight:700}

/* 자동저장 표시 */
#autoSaveTag{position:absolute;right:8px;top:8px;z-index:10;background:rgba(5,150,105,.85);color:#fff;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:700;display:none}

/* ── PROGRESS ── */
.prog-wrap{padding:6px 12px;background:var(--blue-lt);border-top:1px solid rgba(26,86,160,.15);display:none}
.prog-bar{height:3px;background:#dbeafe;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .3s;width:0%}
.prog-txt{font-size:9px;color:var(--blue);margin-top:3px;font-weight:700}
.sbar{padding:5px 10px;font-size:10px;color:var(--muted);background:#f8f9fc;border-top:1px solid var(--bdr);min-height:24px}

/* ── 갤러리 ── */
.gal-bar{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px;margin-bottom:8px}
.gal-bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.gal-bar-btns{display:flex;gap:6px;flex-wrap:wrap}
.gal-ctrl-btn{padding:6px 11px;font-size:11px;font-weight:700;border-radius:20px;cursor:pointer;font-family:inherit;border:1px solid var(--bdr);background:#f3f4f6;color:var(--text);user-select:none}
.gal-ctrl-btn:active{transform:scale(.96)}
.gal-ctrl-btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.gal-ctrl-btn.del-sel{background:#fee2e2;color:var(--red);border-color:#fca5a5}
.gal-ctrl-btn.del-all{background:#fff0f0;color:var(--red);border-color:#fca5a5}
.gal-ctrl-btn.zip-sel{background:#ecfdf5;color:var(--green);border-color:#6ee7b7}
.hidden{display:none!important}
.zip-btn{padding:6px 12px;font-size:11px;font-weight:700;background:var(--green);color:#fff;border:none;border-radius:20px;cursor:pointer;font-family:inherit;white-space:nowrap}
.zip-btn:active{transform:scale(.97)}
.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.gal-item{background:var(--sur);border:2px solid transparent;border-radius:var(--r);overflow:hidden;position:relative;transition:border-color .15s}
.gal-item.selected{border-color:var(--blue)}
.sel-check{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.92);border:2px solid #ccc;display:none;align-items:center;justify-content:center;font-size:12px;z-index:5;pointer-events:none}
.gal-item.selected .sel-check{background:var(--blue);border-color:var(--blue);color:#fff}
.select-mode .sel-check{display:flex}
.select-mode .gal-item{cursor:pointer}
.gal-thumb{width:100%;height:110px;object-fit:cover;display:block;background:#e5e7eb;cursor:pointer}
.gal-thumb.no-img{opacity:.25;filter:grayscale(1)}
.gal-info{padding:6px 8px}
.gal-name{font-size:10px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gal-meta{font-size:9px;color:var(--muted);margin-top:2px;line-height:1.5}
.gal-cloud{font-size:9px;margin-top:3px;font-weight:700}
.gal-cloud.ok{color:var(--green)}
.gal-cloud.local{color:#d97706}
.gal-acts{display:flex;gap:4px;padding:0 6px 6px}
.g-btn{flex:1;padding:5px 2px;font-size:10px;font-weight:700;border-radius:5px;cursor:pointer;text-align:center;border:1px solid var(--bdr);font-family:inherit;background:#fff}
.g-btn-dl{background:var(--blue);color:#fff;border-color:var(--blue)}
.g-btn-del{color:var(--red)}
.g-btn:active{transform:scale(.95)}
.empty{text-align:center;padding:40px 16px;color:var(--muted)}
.empty .ic{font-size:36px;margin-bottom:8px;opacity:.4}
.empty p{font-size:12px}

/* ── 이미지 뷰어 ── */
.img-viewer{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center}
.img-viewer.hidden{display:none}
.img-viewer-img{max-width:100%;max-height:80vh;object-fit:contain;border-radius:8px;cursor:pointer}
.img-viewer-info{color:#fff;font-size:12px;margin-top:10px;text-align:center;opacity:.8}
.img-viewer-hint{color:rgba(255,255,255,.45);font-size:10px;margin-top:6px}
.img-viewer-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.img-viewer-nav{display:flex;gap:16px;margin-top:14px}
.img-viewer-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:20px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.img-viewer-btn:active{background:rgba(255,255,255,.3)}

/* ── 옵션 모달 ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal-bg.hidden{display:none}
.modal-box{background:var(--sur);border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:480px;padding-bottom:calc(16px + var(--sb))}
.modal-box h3{font-size:13px;font-weight:700;margin-bottom:10px}
.opt-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:200px;overflow-y:auto}
.opt-item{display:flex;align-items:center;gap:6px}
.opt-item input{flex:1;padding:7px 9px;font-size:13px;border:1px solid var(--bdr);border-radius:6px;font-family:inherit;outline:none;-webkit-appearance:none}
.opt-item input:focus{border-color:var(--blue)}
.opt-del{width:28px;height:28px;border-radius:50%;border:1px solid #fca5a5;background:#fee2e2;color:var(--red);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.opt-add{width:100%;padding:8px;font-size:12px;font-weight:700;border:1.5px dashed var(--bdr);border-radius:var(--rs);background:#f8f9fc;color:var(--muted);cursor:pointer;font-family:inherit;margin-bottom:2px}
.modal-btns{display:flex;gap:8px;margin-top:10px}
.modal-btns button{flex:1;padding:11px;font-size:13px;font-weight:700;border:none;border-radius:var(--rs);cursor:pointer;font-family:inherit}
.m-cancel{background:#f3f4f6;color:var(--text)}
.m-save{background:var(--blue);color:#fff}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(16px + var(--sb));left:50%;transform:translateX(-50%) translateY(70px);background:#111827;color:#fff;padding:9px 18px;border-radius:24px;font-size:12px;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.2);transition:all .25s;z-index:9999;white-space:nowrap;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{background:#064e3b}
.toast.err{background:#7f1d1d}
</style>
</head>
<body>

<!-- ══ 로그인 화면 ══ -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <span class="ic">📷</span>
      <h1>LH 보상팀 현장조사</h1>
      <p>현장 조사 및 보상 데이터 관리 시스템</p>
    </div>
    <div class="login-field">
      <label>아이디</label>
      <input id="loginId" type="text" placeholder="아이디 입력" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('loginPw').focus()">
    </div>
    <div class="login-field">
      <label>비밀번호</label>
      <input id="loginPw" type="password" placeholder="비밀번호 입력" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ══ 앱 본체 ══ -->
<div class="hdr" id="appHdr">
  <div><h1>📷 LH 보상팀 현장조사</h1><p>현장 조사 및 보상 데이터 관리</p></div>
  <div class="hdr-r">
    <span class="dot"></span>
    <span class="cloud-lbl">클라우드</span>
    <span class="cnt-b" id="cntB">0장</span>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<div class="tabs" id="appTabs">
  <div class="tab on" onclick="switchTab('survey')">📋 현장조사</div>
  <div class="tab" onclick="switchTab('gallery')">🖼 갤러리 (<span id="galCnt">0</span>)</div>
</div>

<div class="scroll" id="appScroll">

  <!-- ══ 현장조사 탭 ══ -->
  <div id="tab-survey" class="panel on">

    <div class="card">
      <div class="form-grid">
        <div class="field"><label>소재지</label><input id="f-addr" placeholder="예: 성안동" oninput="updateOv()"></div>
        <div class="field"><label>지번</label><input id="f-jibun" placeholder="서사리 153" oninput="updateOv()"></div>
      </div>
      <div class="form-grid form-full" style="padding-top:6px;padding-bottom:6px">
        <div class="field"><label>날짜</label><input id="f-date" type="date" oninput="updateOv()"></div>
      </div>
      <div class="chip-sec">
        <div class="chip-sec-hd"><label>지목</label><button class="edit-btn" onclick="openOpt('jiok')">✎</button></div>
        <div class="chip-row" id="jiok-chips"></div>
        <input class="chip-input" id="f-jiok" placeholder="직접 입력" oninput="updateOv();clearChips('jiok-chips')">
      </div>
      <div class="chip-sec" style="padding-top:6px;padding-bottom:8px">
        <div class="chip-sec-hd"><label>이용현황</label><button class="edit-btn" onclick="openOpt('usage')">✎</button></div>
        <div class="chip-row" id="usage-chips"></div>
        <input class="chip-input" id="f-usage" placeholder="직접 입력" oninput="updateOv();clearChips('usage-chips')">
      </div>
      <div class="form-grid form-full" style="padding-top:0;padding-bottom:8px">
        <div class="field"><label>비고</label><input id="f-comment" placeholder="선택사항"></div>
      </div>
      <div class="draw-opts">
        <label>도형 색</label>
        <input type="color" id="polyColor" value="#ff3333">
        <label>선 굵기</label>
        <select id="lineW">
          <option value="2">얇게</option>
          <option value="3" selected>보통</option>
          <option value="5">굵게</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="photo-row">
        <label class="photo-btn" for="camInput"><span class="ic">📸</span><span class="lb">카메라 촬영</span></label>
        <label class="photo-btn" for="fileInput"><span class="ic">🖼</span><span class="lb">갤러리 선택</span></label>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <button class="tool-btn on">✏ 점 찍기</button>
        <button class="tool-btn" onclick="closePoly()">✅ 완료</button>
        <button class="tool-btn" onclick="undoPt()">↩ 취소</button>
        <button class="tool-btn" onclick="clearPoly()">✕ 초기화</button>
        <span class="pt-cnt" id="ptCnt">점 0개</span>
      </div>
      <div class="canvas-wrap" id="canvasArea">
        <div class="canvas-ph" id="ph"><div class="ic">📷</div><p>사진을 선택하세요</p></div>
        <canvas id="mainCanvas"></canvas>
        <canvas id="overlayCanvas"></canvas>
        <div id="infoOv">
          <div class="ov-row"><span class="ov-lbl">소재지</span><span class="ov-val" id="ov-addr">-</span></div>
          <div class="ov-row"><span class="ov-lbl">지번</span><span class="ov-val" id="ov-jibun">-</span></div>
          <div class="ov-row"><span class="ov-lbl">지목</span><span class="ov-val" id="ov-jiok">-</span></div>
          <div class="ov-row"><span class="ov-lbl">이용현황</span><span class="ov-val" id="ov-usage">-</span></div>

async function saveToFirestore(entry){
  try{
    // 사진 데이터를 청크로 나눠서 저장 (Firestore 1MB 제한 대응)
    // 메타데이터 문서
    const meta={
      id:entry.id, baseName:entry.baseName, fileName:entry.fileName,
      date:entry.date, addr:entry.addr, jibun:entry.jibun,
      jiok:entry.jiok, usage:entry.usage, comment:entry.comment||'',
      savedAt:entry.savedAt,
      origSaved:entry.origSaved||false,
      editSaved:entry.editSaved||false,
      hasOrigData: !!entry.origDataUrl,
      hasEditData: !!entry.editDataUrl,
    };
    await fsCollection().doc(entry.id).set(meta);

    // 원본 이미지 데이터 저장 (압축 후)
    if(entry.origDataUrl){
      const compressed = await compressForStorage(entry.origDataUrl);
      await fsCollection().doc(entry.id).collection('data').doc('orig').set({
        dataUrl: compressed
      });
    }
    // 수정본 이미지 데이터 저장
    if(entry.editDataUrl){
      const compressed = await compressForStorage(entry.editDataUrl);
      await fsCollection().doc(entry.id).collection('data').doc('edit').set({
        dataUrl: compressed
      });
    }
  }catch(e){ console.error('Firestore 저장 오류:',e); toast('Firestore 오류: '+e.message,'err'); }
}

// 저장용 압축 (품질 낮춰서 용량 줄이기)
function compressForStorage(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1200;
      const sc=Math.min(1,MAX/Math.max(img.width,img.height));
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*sc);
      c.height=Math.round(img.height*sc);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL('image/jpeg',0.6));
    };
    img.src=dataUrl;
  });
}

function loadImg(e){
  const file=e.target.files[0]; if(!file)return;
  origFile=file;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const area=document.getElementById('canvasArea');
      const W=area.clientWidth;
      const ratio=img.height/img.width;
      const isLandscape=img.width>=img.height;
      let H=isLandscape
        ? Math.min(Math.round(W*ratio),Math.round(window.innerHeight*.6))
        : Math.min(Math.round(W*ratio),Math.round(window.innerHeight*.75));
      H=Math.max(H,200);
      area.style.height=H+'px';
      mC.width=oC.width=W; mC.height=oC.height=H; cW=W; cH=H;
      const sc=Math.max(W/img.width,H/img.height);
      const dw=img.width*sc,dh=img.height*sc,dx=(W-dw)/2,dy=(H-dh)/2;
      mX.clearRect(0,0,W,H); mX.drawImage(img,dx,dy,dw,dh);
      bgImg={img,dx,dy,dw,dh};
      points=[]; polyClosed=false;
      document.getElementById('ph').style.display='none';

      origDataUrl=ev.target.result;
      // 자동으로 원본 저장
      autoSaveOrig(img, ev.target.result);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

// ══ CANVAS ══
function gPos(e){
  const rect=oC.getBoundingClientRect(),sx=oC.width/rect.width,sy=oC.height/rect.height;
  if(e.touches)return{x:(e.touches[0].clientX-rect.left)*sx,y:(e.touches[0].clientY-rect.top)*sy};
  return{x:(e.clientX-rect.left)*sx,y:(e.clientY-rect.top)*sy};
}
oC.addEventListener('click',e=>{if(!bgImg||polyClosed)return;points.push(gPos(e));setPt();drawOv();setSt('점 '+points.length+'개 — [완료]로 도형 완성!');});
oC.addEventListener('touchend',e=>{e.preventDefault();if(!bgImg||polyClosed)return;const t=e.changedTouches[0];points.push(gPos({touches:[t]}));setPt();drawOv();setSt('점 '+points.length+'개 — [완료]로 도형 완성!');},{passive:false});
oC.addEventListener('mousemove',e=>{if(!bgImg||polyClosed||!points.length)return;drawOv(gPos(e));});

function drawOv(mouse){
  oX.clearRect(0,0,oC.width,oC.height); if(!points.length)return;
  const color=document.getElementById('polyColor').value,lw=parseInt(document.getElementById('lineW').value);
  oX.save();oX.strokeStyle=color;oX.lineWidth=lw;oX.lineJoin='round';oX.lineCap='round';
  oX.beginPath();oX.moveTo(points[0].x,points[0].y);
  for(let i=1;i<points.length;i++)oX.lineTo(points[i].x,points[i].y);
  if(polyClosed)oX.closePath();else if(mouse)oX.lineTo(mouse.x,mouse.y);
  oX.stroke();

  // 점 표시 - 완료(polyClosed) 전에만 보임
  if(!polyClosed){
    points.forEach((p,i)=>{
      // 점 원
      oX.beginPath();oX.arc(p.x,p.y,5,0,Math.PI*2);
      oX.fillStyle=color;oX.fill();
      oX.strokeStyle='#fff';oX.lineWidth=1.5;oX.stroke();
      // 번호
      oX.fillStyle='#fff';
      oX.font=`bold ${Math.max(10,lw*3)}px sans-serif`;
      oX.textAlign='center';oX.textBaseline='middle';
      oX.fillText(i+1,p.x,p.y);
    });
  }
  oX.restore();
}
function closePoly(){if(points.length<3){toast('점을 3개 이상 찍어야 합니다.','err');return;}polyClosed=true;drawOv();setSt('✅ 도형 완성! [수정본 저장]을 눌러주세요.');}
function clearPoly(){points=[];polyClosed=false;setPt();if(oC.style.display!=='none')drawOv();setSt('초기화됨.');}
function undoPt(){if(!points.length)return;if(polyClosed)polyClosed=false;points.pop();setPt();drawOv();setSt('취소. ('+points.length+'개 남음)');}
function setPt(){document.getElementById('ptCnt').textContent='점 '+points.length+'개';}
function setSt(t){document.getElementById('sbar').textContent=t;}

// ══ INFO TABLE - 검정 테두리, 흰 배경 ══
function drawTable(ctx,W,H){
  const v=id=>document.getElementById(id).value.trim()||'-';
  const rows=[['소재지',v('f-addr')],['지번',v('f-jibun')],['지목',v('f-jiok')],['이용현황',v('f-usage')],['날짜',v('f-date')]];
  const cm=v('f-comment'); if(cm!=='-')rows.push(['비고',cm]);

  const tw=Math.max(180,Math.round(W*.26));
  const labelW=Math.round(tw*.38);
  const fs=Math.max(12,Math.round(tw*.068));
  const lh=Math.round(fs*2.2);
  const th=rows.length*lh;
  const margin=Math.round(W*.012);
  const tx=margin, ty=Math.max(margin,H-th-margin);
  const bdr=Math.max(1,Math.round(W/900));

  ctx.save();

  // 그림자
  ctx.shadowColor='rgba(0,0,0,0.3)';
  ctx.shadowBlur=bdr*6; ctx.shadowOffsetX=bdr*2; ctx.shadowOffsetY=bdr*2;

  // 흰 배경
  ctx.fillStyle='#ffffff';
  ctx.fillRect(tx,ty,tw,th);
  ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;

  // 외곽 검정 테두리
  ctx.strokeStyle='#000000';
  ctx.lineWidth=bdr*1.5;
  ctx.strokeRect(tx,ty,tw,th);

  // 세로 구분선 (라벨|값)
  ctx.strokeStyle='#000000';
  ctx.lineWidth=bdr;
  ctx.beginPath();
  ctx.moveTo(tx+labelW,ty);
  ctx.lineTo(tx+labelW,ty+th);
  ctx.stroke();

  // 행마다
  rows.forEach(([l,val],i)=>{
    const rowY=ty+i*lh;
    const textY=rowY+Math.round(lh*.65);

    // 가로 구분선
    if(i>0){
      ctx.strokeStyle='#000000';
      ctx.lineWidth=bdr*0.7;
      ctx.beginPath();
      ctx.moveTo(tx,rowY);
      ctx.lineTo(tx+tw,rowY);
      ctx.stroke();
    }

    // 라벨 배경 (연한 회색)
    ctx.fillStyle='#f5f5f5';
    ctx.fillRect(tx+bdr,rowY+(i>0?bdr*0.5:0),labelW-bdr,lh-(i>0?bdr*0.5:0));

    // 라벨 텍스트
    ctx.font=`600 ${fs}px sans-serif`;
    ctx.fillStyle='#333333';
    ctx.textAlign='left';
    ctx.textBaseline='alphabetic';
    ctx.fillText(l, tx+Math.round(fs*.45), textY);

    // 값 텍스트
    ctx.font=`700 ${fs}px sans-serif`;
    ctx.fillStyle='#000000';
    const maxW=tw-labelW-Math.round(fs*.9);
    let dv=val;
    while(ctx.measureText(dv).width>maxW&&dv.length>1) dv=dv.slice(0,-1);
    if(dv!==val) dv+='..';
    ctx.fillText(dv, tx+labelW+Math.round(fs*.45), textY);
  });

  ctx.restore();
}

// ══ 클라우드 업로드 공통 함수 ══
function uploadToCloud(dataUrl, publicLabel, onSuccess, onFail){
  const b64=dataUrl.split(',')[1];
  fetch(UPLOAD_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      file:'data:image/jpeg;base64,'+b64,
      upload_preset:UPLOAD_PRESET,
      api_key:API_KEY
    })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.error){onFail&&onFail(res.error.message);return;}
    onSuccess&&onSuccess(res.secure_url);
  })
  .catch(err=>onFail&&onFail(err.message));
}

// ══ 수정본 저장 ══
function savePhoto(){
  if(!bgImg){toast('먼저 사진을 선택하세요.','err');return;}

  // 마지막으로 자동저장된 entry 찾기
  const lastEntry=photos[photos.length-1];
  if(!lastEntry){toast('원본이 없습니다. 사진을 다시 선택해주세요.','err');return;}

  const doSave=(origImg)=>{
    const W=origImg.width,H=origImg.height;
    const ec=document.createElement('canvas');ec.width=W;ec.height=H;
    const ex=ec.getContext('2d');ex.drawImage(origImg,0,0,W,H);
    if(points.length>=2){
      const rx=W/bgImg.dw,ry=H/bgImg.dh;
      const color=document.getElementById('polyColor').value;
      const lw=Math.max(2,parseInt(document.getElementById('lineW').value)*Math.min(rx,ry));
      ex.strokeStyle=color;ex.lineWidth=lw;ex.lineJoin='round';ex.lineCap='round';
      ex.beginPath();
      ex.moveTo((points[0].x-bgImg.dx)*rx,(points[0].y-bgImg.dy)*ry);
      for(let i=1;i<points.length;i++)ex.lineTo((points[i].x-bgImg.dx)*rx,(points[i].y-bgImg.dy)*ry);
      if(polyClosed)ex.closePath();ex.stroke();
    }
    drawTable(ex,W,H);
    const editDataUrl=ec.toDataURL('image/jpeg',.93);
    lastEntry.editDataUrl=editDataUrl; lastEntry.editSaved=true; lastEntry.hasEditData=true;
    saveLocal();
    document.getElementById('saveBtn').disabled=true;
    showProg(10,'수정본 저장 중...');

    // Firestore에 수정본 저장
    saveToFirestore(lastEntry).then(()=>{
      showProg(100,'✅ 완료!'); setTimeout(hideProg,1500);
      toast('💾 수정본 저장: '+lastEntry.fileName,'ok');
      setSt('✅ 수정본 저장 완료: '+lastEntry.fileName);
      document.getElementById('saveBtn').disabled=false;
      if(document.getElementById('tab-gallery').classList.contains('on'))renderGallery();
    }).catch(err=>{
      hideProg(); toast('저장 실패: '+err.message,'err');
      document.getElementById('saveBtn').disabled=false;
    });

    // Cloudinary 백업 (선택적)
    uploadToCloud(editDataUrl, lastEntry.id+'_edit', (url)=>{
      lastEntry.editCloudUrl=url; saveLocal();
    }, ()=>{});
  };

  if(origFile){
    const r=new FileReader();
    r.onload=ev=>{const img=new Image();img.onload=()=>doSave(img);img.src=ev.target.result;};
    r.readAsDataURL(origFile);
  } else doSave(bgImg.img);
}

function showProg(p,t){document.getElementById('progWrap').style.display='block';document.getElementById('progFill').style.width=p+'%';document.getElementById('progTxt').textContent=t;}
function hideProg(){document.getElementById('progWrap').style.display='none';}

// ══ ZIP 다운로드 (Firestore에서 이미지 가져오기) ══
async function downloadZip(){
  if(!photos.length){toast('저장된 사진이 없습니다.','err');return;}
  toast('📦 ZIP 생성 중... 잠시만 기다려주세요','ok');
  showProg(5,'사진 데이터 불러오는 중...');
  try{
    const zip=new JSZip();
    const origFolder=zip.folder('원본사진');
    const editFolder=zip.folder('수정본사진');
    const total=photos.length;

    for(let i=0;i<photos.length;i++){
      const p=photos[i];
      showProg(Math.round((i/total)*80), `(${i+1}/${total}) ${p.fileName} 처리 중...`);

      // 원본: 로컬 → Firestore 순으로 시도
      let origData = p.origDataUrl;
      if(!origData && p.hasOrigData){
        origData = await getImageData(p.id, 'orig');
      }
      if(origData){
        origFolder.file(p.fileName+'_원본.jpg', origData.split(',')[1], {base64:true});
      }

      // 수정본
      let editData = p.editDataUrl;
      if(!editData && p.hasEditData){
        editData = await getImageData(p.id, 'edit');
      }
      if(editData){
        editFolder.file(p.fileName+'_수정본.jpg', editData.split(',')[1], {base64:true});
      }
    }

    showProg(90,'ZIP 압축 중...');
    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url;
    a.download='LH_현장조사_'+new Date().toISOString().split('T')[0]+'.zip';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showProg(100,'✅ ZIP 완료!'); setTimeout(hideProg,1500);
    toast('✅ ZIP 완료 ('+photos.length+'장)','ok');
  }catch(e){ hideProg(); toast('ZIP 실패: '+e.message,'err'); }
}
// ══ GALLERY ══
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',(t==='survey'?0:1)===i));
  document.getElementById('tab-survey').classList.toggle('on',t==='survey');
  document.getElementById('tab-gallery').classList.toggle('on',t==='gallery');
  if(t==='gallery'){selectMode=false;selectedIdx.clear();renderGallery();}
}
function updateBadge(){
  const n=photos.length;
  document.getElementById('cntB').textContent=n+'장';
  document.getElementById('galCnt').textContent=n;
  document.getElementById('zipInfo').textContent='총 '+n+'장 · 원본+수정본 ZIP 다운로드';
}
function toggleSelectMode(){
  selectMode=!selectMode;selectedIdx.clear();
  const btn=document.getElementById('selectModeBtn');
  const zipSelBtn=document.getElementById('zipSelBtn');
  const delBtn=document.getElementById('delSelBtn');
  btn.classList.toggle('on',selectMode);
  btn.textContent=selectMode?'✕ 선택 취소':'☑ 선택';
  zipSelBtn.classList.toggle('hidden',!selectMode);
  delBtn.classList.toggle('hidden',!selectMode);
  document.getElementById('selCnt').textContent='0';
  renderGallery();
}
function toggleSelect(i){
  if(!selectMode)return;
  if(selectedIdx.has(i))selectedIdx.delete(i);else selectedIdx.add(i);
  document.getElementById('selCnt').textContent=selectedIdx.size;
  document.querySelectorAll('.gal-item').forEach((el,idx)=>el.classList.toggle('selected',selectedIdx.has(idx)));
}
function deleteSelected(){
  if(!selectedIdx.size){toast('선택된 사진이 없습니다.','err');return;}
  const sorted=[...selectedIdx].sort((a,b)=>b-a);
  const deletedIds=sorted.map(i=>photos[i].id);
  sorted.forEach(i=>photos.splice(i,1));
  selectedIdx.clear();document.getElementById('selCnt').textContent='0';
  updateBadge();saveLocal();
  deletedIds.forEach(id=>deleteFromFirestore(id));
  renderGallery();toast(sorted.length+'장 삭제됨','ok');
}
function deleteAll(){
  if(!photos.length){toast('삭제할 사진이 없습니다.','err');return;}
  const n=photos.length;
  const ids=photos.map(p=>p.id);
  photos=[];selectedIdx.clear();selectMode=false;
  document.getElementById('selectModeBtn').classList.remove('on');
  document.getElementById('selectModeBtn').textContent='☑ 선택';
  document.getElementById('delSelBtn').classList.add('hidden');
  document.getElementById('zipSelBtn').classList.add('hidden');
  updateBadge();saveLocal();
  ids.forEach(id=>deleteFromFirestore(id));
  renderGallery();toast(n+'장 전체 삭제됨','ok');
}
function renderGallery(){
  const el=document.getElementById('galContent');
  if(!photos.length){el.innerHTML='<div class="empty"><div class="ic">🖼</div><p>저장된 사진이 없습니다</p></div>';return;}
  const grid=document.createElement('div');
  grid.className='gal-grid'+(selectMode?' select-mode':'');
  grid.innerHTML=photos.map((p,i)=>`
    <div class="gal-item${selectedIdx.has(i)?' selected':''}" onclick="selectMode?toggleSelect(${i}):openViewer(${i})">
      <div class="sel-check">✓</div>
      <img class="gal-thumb" id="thumb-${p.id}"
        src="${p.origDataUrl||p.editDataUrl||''}"
        alt="${p.fileName}"
        onerror="this.classList.add('no-img')"
        onload="this.classList.remove('no-img')">
      <div class="gal-info">
        <div class="gal-name">📄 ${p.fileName}</div>
        <div class="gal-meta">${p.addr||'-'} ${p.jibun||''}<br>${p.jiok||'-'} · ${p.usage||'-'}<br>${p.date||''}</div>
        <div class="gal-cloud ok">${p.origSaved?'☁️ 원본':''} ${p.editSaved?'✏️ 수정본':''}</div>
      </div>
      <div class="gal-acts" onclick="event.stopPropagation()">
        <button class="g-btn g-btn-dl" onclick="dlOne(${i})">↓ 저장</button>
        <button class="g-btn g-btn-del" onclick="delOne(${i})">삭제</button>
      </div>
    </div>`).join('');
  el.innerHTML='';el.appendChild(grid);

  // 썸네일 없으면 Firestore에서 불러오기
  photos.forEach(async(p,i)=>{
    if(!p.origDataUrl && !p.editDataUrl && p.hasOrigData){
      const data=await getImageData(p.id,'orig');
      if(data){
        p.origDataUrl=data;
        const img=document.getElementById('thumb-'+p.id);
        if(img){img.src=data;img.classList.remove('no-img');}
      }
    }
  });
}

// ── 이미지 뷰어 ──
let viewerIdx=0;
async function openViewer(i){
  viewerIdx=i;
  const p=photos[i];
  document.getElementById('imgViewer').classList.remove('hidden');
  document.getElementById('viewerInfo').textContent=p.fileName+' · '+p.date;
  // 이미지 우선순위: 수정본 → 원본
  let src=p.editDataUrl||p.origDataUrl;
  if(!src && p.hasEditData) src=await getImageData(p.id,'edit');
  if(!src && p.hasOrigData) src=await getImageData(p.id,'orig');
  document.getElementById('viewerImg').src=src||'';
}
function closeViewer(){
  document.getElementById('imgViewer').classList.add('hidden');
}
function viewerPrev(){
  if(viewerIdx>0) openViewer(viewerIdx-1);
}
function viewerNext(){
  if(viewerIdx<photos.length-1) openViewer(viewerIdx+1);
}

// 선택 ZIP 다운로드
async function downloadZipSelected(){
  if(!selectedIdx.size){toast('사진을 선택해주세요.','err');return;}
  const selected=[...selectedIdx].sort((a,b)=>a-b).map(i=>photos[i]);
  toast('📦 선택 ZIP 생성 중...','ok');
  showProg(5,'선택된 사진 처리 중...');
  try{
    const zip=new JSZip();
    const origFolder=zip.folder('원본사진');
    const editFolder=zip.folder('수정본사진');
    for(let i=0;i<selected.length;i++){
      const p=selected[i];
      showProg(Math.round((i/selected.length)*80),'('+( i+1)+'/'+selected.length+') '+p.fileName);
      let origData=p.origDataUrl;
      if(!origData && p.hasOrigData) origData=await getImageData(p.id,'orig');
      if(origData) origFolder.file(p.fileName+'_원본.jpg',origData.split(',')[1],{base64:true});
      let editData=p.editDataUrl;
      if(!editData && p.hasEditData) editData=await getImageData(p.id,'edit');
      if(editData) editFolder.file(p.fileName+'_수정본.jpg',editData.split(',')[1],{base64:true});
    }
    showProg(90,'ZIP 압축 중...');
    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download='LH_선택사진_'+new Date().toISOString().split('T')[0]+'.zip';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    showProg(100,'✅ 완료!');setTimeout(hideProg,1500);
    toast('✅ 선택 ZIP 완료 ('+selected.length+'장)','ok');
  }catch(e){hideProg();toast('ZIP 실패: '+e.message,'err');}
}
function dlOne(i){
  const p=photos[i];
  const url=p.editCloudUrl||p.origCloudUrl||p.editDataUrl||p.origDataUrl;
  if(!url){toast('저장된 파일이 없습니다.','err');return;}
  const a=document.createElement('a');a.href=url;a.download=p.fileName+'.jpg';
  if(url.startsWith('http'))a.target='_blank';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}
function delOne(i){
  const id=photos[i].id;
  photos.splice(i,1);selectedIdx.clear();
  updateBadge();saveLocal();
  deleteFromFirestore(id);
  renderGallery();toast('삭제됨','ok');
}

function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type==='ok'?'ok':type==='err'?'err':'');
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',3000);
}
